gui:
  theme:
    activeBorderColor:
      # - "#61afef" # Blue
      - "#58a6ff" # GitHub Dark Colorblind blue
      - bold
    inactiveBorderColor:
      # - "#5c6370" # Comment Grey
      - "#8b949e" # GitHub muted fg
    optionsTextColor:
      # - "#61afef" # Blue
      - "#58a6ff" # GitHub Dark Colorblind blue
    selectedLineBgColor:
      # - "#3e4452" # Darker Grey
      - "#21262d" # GitHub canvas subtle
    cherryPickedCommitFgColor:
      # - "#98c379" # Green
      - "#79c0ff" # GitHub bright blue
    cherryPickedCommitBgColor:
      # - "#56b6c2" # Cyan
      - "#0c2d6b" # GitHub dark blue bg
    markedBaseCommitFgColor:
      # - "#61afef" # Blue
      - "#58a6ff" # GitHub Dark Colorblind blue
    markedBaseCommitBgColor:
      # - "#98c379" # Green
      - "#1f6feb" # GitHub blue emphasis
    unstagedChangesColor:
      # - "#e06c75" # Red
      - "#ec8e2c" # GitHub orange (danger/open)
    defaultFgColor:
      # - "#abb2bf" # Light Grey
      - "#c9d1d9" # GitHub default fg
customCommands:
  # retrieved from: https://github.com/jesseduffield/lazygit/wiki/Custom-Commands-Compendium#conventional-commit
  - key: "<c-v>"
    context: "global"
    description: "Create new conventional commit"
    prompts:
      - type: "menu"
        key: "Type"
        title: "Type of change"
        options:
          - name: "build"
            description: "Changes that affect the build system or external dependencies"
            value: "build"
          - name: "feat"
            description: "A new feature"
            value: "feat"
          - name: "fix"
            description: "A bug fix"
            value: "fix"
          - name: "chore"
            description: "Other changes that don't modify src or test files"
            value: "chore"
          - name: "ci"
            description: "Changes to CI configuration files and scripts"
            value: "ci"
          - name: "docs"
            description: "Documentation only changes"
            value: "docs"
          - name: "perf"
            description: "A code change that improves performance"
            value: "perf"
          - name: "refactor"
            description: "A code change that neither fixes a bug nor adds a feature"
            value: "refactor"
          - name: "revert"
            description: "Reverts a previous commit"
            value: "revert"
          - name: "style"
            description: "Changes that do not affect the meaning of the code"
            value: "style"
          - name: "test"
            description: "Adding missing tests or correcting existing tests"
            value: "test"
      - type: "input"
        title: "Scope"
        key: "Scope"
        initialValue: ""
      - type: "menu"
        key: "Breaking"
        title: "Breaking change"
        options:
          - name: "no"
            value: ""
          - name: "yes"
            value: "!"
      - type: "input"
        title: "message"
        key: "Message"
        initialValue: ""
      - type: "confirm"
        key: "Confirm"
        title: "Commit"
        body: "Are you sure you want to commit?"
    command: "git commit --message '{{.Form.Type}}{{ if .Form.Scope }}({{ .Form.Scope }}){{ end }}{{.Form.Breaking}}: {{.Form.Message}}'"
    loadingText: "Creating conventional commit..."
  - key: "G"
    command: "glab mr view -w {{.SelectedLocalBranch.UpstreamBranch}}"
    context: "localBranches"
    description: "Go to MR in gitlab"
    output: log
  - key: "<c-r>"
    command: "gh pr create --fill --web"
    context: "global"
    loadingText: "Creating pull request on GitHub"
  - key: "C"
    command: "git cz c"
    description: "commit with commitizen"
    context: "files"
    loadingText: "opening commitizen commit tool"
    output: terminal
