---
- name: install homebrew taps
  community.general.homebrew_tap:
    name: "{{ item }}"
    state: present
  loop: "{{ brew_taps }}"

- name: install homebrew formulae
  community.general.homebrew:
    name: "{{ brew_formulae }}"
    state: present
    update_homebrew: true

- name: install homebrew casks
  community.general.homebrew_cask:
    name: "{{ item }}"
    state: present
  loop: "{{ brew_casks }}"
  # casks can fail if the app is already installed outside of Homebrew;
  # greedy=true updates to the latest version if already present
  ignore_errors: true
