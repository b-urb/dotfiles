---
- name: check if rustup is installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.cargo/bin/rustup"
  register: rustup_stat

- name: install rustup
  ansible.builtin.shell:
    cmd: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
  when: not rustup_stat.stat.exists

- name: set stable as default toolchain
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.cargo/bin/rustup default stable"
  when: not rustup_stat.stat.exists
  changed_when: false

- name: check installed cargo crates
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.cargo/bin/cargo install --list"
  register: cargo_installed
  changed_when: false
  failed_when: false

- name: install cargo crates
  ansible.builtin.command:
    cmd: "{{ ansible_env.HOME }}/.cargo/bin/cargo install {{ item }}"
  loop: "{{ cargo_crates }}"
  environment:
    PATH: "{{ ansible_env.PATH }}:{{ ansible_env.HOME }}/.cargo/bin"
  # cargo install is idempotent if the crate is already at the latest version,
  # but reports changed every time. Use changed_when: false to avoid noise.
  changed_when: false
  # A single crate failing (e.g. compile error on one platform) should not
  # abort the entire run.
  failed_when: false
