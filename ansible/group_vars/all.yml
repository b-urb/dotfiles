---
# Shared variables across all platforms

# Cargo crates installed after Rust/rustup is set up.
# Flags like --locked are appended inline.
cargo_crates:
  - cargo-update
  - cargo-edit
  - eza
  - atac --locked
  - rainfrog
  - zoxide --locked
  - atuin
  - spotify-tui
  - zellij --locked
  - just
  - starship --locked
  - create-tauri-app
  - tauri-cli
  - trunk
  - doclytics

# VS Code extensions (full list from Brewfile).
