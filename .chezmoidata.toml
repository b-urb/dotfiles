# ─── Feature flags ──────────────────────────────────────────────────────────
[features]
    enableZinit    = true
    enableAtuin    = true
    enableStarship = true
    enableK8s      = true
    enableFzf      = true
    enableZoxide   = true

# ─── Windows host packages ──────────────────────────────────────────────────
# Scoop packages installed on Windows host (CLI tools, dev tools).
# These mirror the brew formulae that make sense outside WSL.
[windows]
    scoop_buckets = [
        "extras",
        "nerd-fonts",
        "versions",
    ]
    scoop_packages = [
        # Dev tools
        "git",
        "gh",
        "lazygit",
        "neovim",
        "helix",
        "vim",
        # CLI tools
        "bat",
        "eza",
        "fd",
        "fzf",
        "ripgrep",
        "zoxide",
        "lsd",
        "duf",
        "jq",
        "yq",
        "just",
        "aria2",
        "dos2unix",
        "htop",
        "curl",
        "wget",
        "7zip",
        "starship",
        "atuin",
        "yazi",
        "zellij",
        "carapace",
        "nushell",
        # Kubernetes
        "kubectl",
        "helm",
        "k9s",
        "k3d",
        "kind",
        # Cloud / infra
        "aws",
        "azure-cli",
        "opentofu",
        "pulumi",
        "sops",
        # Languages / runtimes
        "go",
        "nodejs",
        "yarn",
        "pnpm",
        "python",
        "maven",
        "gradle",
        # Build tools
        "cmake",
        "make",
        "gcc",
        "llvm",
        "lua",
        # Media
        "ffmpeg",
        "imagemagick",
        # Misc
        "ollama",
        "hugo",
        "rustup",
        "docker-compose",
    ]
    # Winget packages (GUI apps and things not in Scoop).
    # Format: "Publisher.PackageId"
    winget_packages = [
        "Bitwarden.Bitwarden",
        "Bitwarden.CLI",
        "Microsoft.VisualStudioCode",
        "Discord.Discord",
        "Figma.Figma",
        "Mozilla.Firefox",
        "Mozilla.Firefox.DeveloperEdition",
        "BraveSoftware.BraveBrowser",
        "JetBrains.Toolbox",
        "Obsidian.Obsidian",
        "OpenWhisperSystems.Signal",
        "SlackTechnologies.Slack",
        "Spotify.Spotify",
        "Postman.Postman",
        "VideoLAN.VLC",
        "WhatsApp.WhatsApp",
        "Zoom.Zoom",
        "tailscale.tailscale",
        "Microsoft.PowerShell",
        "RustDesk.RustDesk",
    ]
    # Nerd Fonts installed via Scoop nerd-fonts bucket.
    scoop_fonts = [
        "Monaspace",
        "Hack-NF",
        "JetBrainsMono-NF",
        "FiraCode-NF",
        "Meslo-NF",
    ]
