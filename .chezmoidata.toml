    "ms-vsliveshare.vsliveshare",
    "naumovs.color-highlight",
    "oderwat.indent-rainbow",
    "openai.chatgpt",
    "orta.vscode-jest",
    "panicbit.cargo",
    "pkief.material-icon-theme",
    "pulkitgangwar.nextjs-snippets",
    "quicktype.quicktype",
    "rangav.vscode-thunder-client",
